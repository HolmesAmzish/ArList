<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Todo List</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .fade {
            transition: opacity 0.3s ease;
        }
        .fade-out {
            opacity: 0;
        }
        .fade-in {
            opacity: 1;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">

<div class="w-full max-w-2xl bg-white shadow-xl rounded-2xl p-6">
    <h1 class="text-3xl font-bold mb-6 text-center text-gray-800">🌿 My Todo List</h1>

    <!-- Controls -->
    <div class="flex items-center mb-6">
        <input type="checkbox" id="show-completed" class="mr-2">
        <label for="show-completed">Show Completed Tasks</label>
    </div>

    <!-- Add Todo Form -->
    <form id="todoEntity-form" class="flex gap-3 mb-6">
        <input type="text" id="todoEntity-title" placeholder="Enter new todoEntity..." required
               class="flex-grow px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
        <button type="submit"
                class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg">Add</button>
    </form>

    <!-- Todo List -->
    <ul id="todoEntity-list" class="space-y-3">
        <!-- Todos will be rendered here -->
    </ul>
</div>

<script>
    const API_BASE = 'http://list.arorms.cn/api/todos'
    // const API_BASE = 'http://localhost:8080/api/todos';
    let showCompleted = false; // Default to hide completed tasks

    async function fetchTodos() {
        try {
            const res = await fetch(API_BASE);
            const todos = await res.json();
            renderTodos(todos);
        } catch (error) {
            console.error('Error fetching todos:', error);
        }
    }

    async function addTodo(title) {
        try {
            await fetch(API_BASE, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, completed: false })
            });
            fetchTodos();
        } catch (error) {
            console.error('Error adding todoEntity:', error);
        }
    }

    async function toggleComplete(todoEntity) {
        try {
            await fetch(`${API_BASE}/${todoEntity.id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ ...todoEntity, completed: !todoEntity.completed })
            });

            // If task was just completed and we're not showing completed tasks, hide it
            if (!showCompleted && !todoEntity.completed) {
                const li = document.querySelector(`li[data-id="${todoEntity.id}"]`);
                if (li) {
                    li.classList.add('fade-out');
                    setTimeout(() => li.remove(), 300);
                }
            }
        } catch (error) {
            console.error('Error toggling todoEntity:', error);
        }
    }

    async function deleteTodo(id) {
        try {
            await fetch(`${API_BASE}/${id}`, { method: 'DELETE' });
            fetchTodos();
        } catch (error) {
            console.error('Error deleting todoEntity:', error);
        }
    }

    function renderTodos(todos) {
        const list = document.getElementById('todoEntity-list');
        list.innerHTML = '';

        if (todos.length === 0) {
            list.innerHTML = '<li class="text-center text-gray-500 py-4">No todos found</li>';
            return;
        }

        // Filter out completed tasks unless showCompleted is true
        const filteredTodos = showCompleted
            ? todos
            : todos.filter(todoEntity => !todoEntity.completed);

        if (filteredTodos.length === 0) {
            list.innerHTML = '<li class="text-center text-gray-500 py-4">' +
                (showCompleted ? 'No todos found' : 'No active todos') + '</li>';
            return;
        }

        filteredTodos.forEach(todoEntity => {
            const li = document.createElement('li');
            li.className = `flex justify-between items-center p-4 rounded-lg shadow fade ${
                todoEntity.completed ? 'bg-green-100' : 'bg-gray-100'
            } fade-in`;
            li.dataset.id = todoEntity.id;
            li.dataset.completed = todoEntity.completed;

            li.innerHTML = `
                <div class="flex items-center gap-2">
                    <input type="checkbox" ${todoEntity.completed ? 'checked' : ''}
                           class="w-5 h-5 text-blue-600 rounded" />
                    <span class="text-lg ${
                todoEntity.completed ? 'line-through text-gray-400' : 'text-gray-800'
            }">${todoEntity.title}</span>
                </div>
                <button class="text-red-500 hover:text-red-700">Delete</button>
            `;

            // Checkbox toggle
            li.querySelector('input').addEventListener('change', () => toggleComplete(todoEntity));

            // Delete button
            li.querySelector('button').addEventListener('click', () => deleteTodo(todoEntity.id));

            list.appendChild(li);
        });
    }

    // Show completed toggle
    document.getElementById('show-completed').addEventListener('change', (e) => {
        showCompleted = e.target.checked;
        fetchTodos();
    });

    // Form submission
    document.getElementById('todoEntity-form').addEventListener('submit', e => {
        e.preventDefault();
        const input = document.getElementById('todoEntity-title');
        const title = input.value.trim();
        if (title) {
            addTodo(title);
            input.value = '';
        }
    });

    // Initial fetch
    fetchTodos();
</script>
</body>
</html>
